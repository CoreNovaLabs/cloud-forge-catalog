AWSTemplateFormatVersion: '2010-09-09'
Description: 'n8n on Cloud Forge CLI - one-command deployment'

Parameters:
  InstanceType:
    Type: String
    Default: t3.large
    AllowedValues: [t3.medium, t3.large, t3.xlarge]
  LatestAmiId:
    Type: AWS::EC2::Image::Id
    Default: ami-04cf9ac8716f030d6
  CaddyTlsMode:
    Type: String
    Default: ip-letsencrypt
    AllowedValues: [ip-letsencrypt, http, internal]
    Description: Caddy TLS mode for the public endpoint.
  KeyName:
    Type: String
    Default: ''
    Description: Optional EC2 key pair name for SSH access.
  DomainName:
    Type: String
    Default: ''
  HostedZoneId:
    Type: String
    Default: ''
  DiskSize:
    Type: Number
    Default: 40
    MinValue: 20
    MaxValue: 500
  VpcId:
    Type: String
    Default: ''
  SubnetId:
    Type: String
    Default: ''
  AllowedIP:
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: '^(([0-9]{1,3}\.){3}[0-9]{1,3}/([0-9]|[1-2][0-9]|3[0-2]))$'

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, '']]
  HasDomain: !Not [!Equals [!Ref DomainName, '']]
  HasHostedZone: !Not [!Equals [!Ref HostedZoneId, '']]
  HasDNS: !And [!Condition HasDomain, !Condition HasHostedZone]
  HasVpc: !Not [!Equals [!Ref VpcId, '']]
  HasSubnet: !Not [!Equals [!Ref SubnetId, '']]
  UseHttp: !Equals [!Ref CaddyTlsMode, http]

Resources:
  N8nSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP, HTTPS, and restricted SSH for n8n
      VpcId: !If [HasVpc, !Ref VpcId, !Ref AWS::NoValue]
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedIP
      Tags:
        - Key: cloud-forge:app
          Value: n8n

  N8nInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref AWS::NoValue]
      SubnetId: !If [HasSubnet, !Ref SubnetId, !Ref AWS::NoValue]
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: !Ref DiskSize
            VolumeType: gp3
      SecurityGroupIds:
        - !Ref N8nSecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          install -d -m 0755 /opt/cloud-forge/data/n8n
          chown -R 1000:1000 /opt/cloud-forge/data/n8n
          cat >/opt/cloud-forge/docker-compose.app.yml <<'COMPOSE'
          services:
            n8n:
              image: n8nio/n8n:latest
              restart: unless-stopped
              environment:
                - N8N_PORT=5678
                - N8N_PROTOCOL=http
              volumes:
                - /opt/cloud-forge/data/n8n:/home/node/.n8n
              networks:
                - cloud-forge
          COMPOSE
          install -d -m 0755 /etc/cloud-forge
          cat >/etc/cloud-forge/app.env <<EOF
          CLOUD_FORGE_CADDY_PUBLIC_IP=${N8nEIP}
          CLOUD_FORGE_CADDY_UPSTREAM=http://n8n:5678
          CLOUD_FORGE_CADDY_TLS_MODE=${CaddyTlsMode}
          CLOUD_FORGE_CADDY_AUTO_IP_CERT=true
          EOF
          /opt/cloud-forge/bin/cloud-forge-apply-app
      Tags:
        - Key: Name
          Value: cloud-forge-n8n
        - Key: cloud-forge:app
          Value: n8n

  N8nEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: cloud-forge:app
          Value: n8n

  N8nEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt N8nEIP.AllocationId
      InstanceId: !Ref N8nInstance

  N8nDNS:
    Type: AWS::Route53::RecordSet
    Condition: HasDNS
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      TTL: 300
      ResourceRecords:
        - !Ref N8nEIP

Outputs:
  ServiceURL:
    Description: Primary endpoint for n8n.
    Value: !If
      - UseHttp
      - !Sub 'http://${N8nEIP}'
      - !Sub 'https://${N8nEIP}'
  PublicIP:
    Description: Elastic IP address assigned to the service.
    Value: !Ref N8nEIP
  InstanceId:
    Description: Created EC2 instance ID.
    Value: !Ref N8nInstance
  AWSRegion:
    Description: AWS region where the stack is deployed.
    Value: !Ref AWS::Region
  AmiId:
    Description: AMI ID used by the EC2 instance.
    Value: !Ref LatestAmiId
  InstanceType:
    Description: EC2 instance type.
    Value: !Ref InstanceType
  SecurityGroupId:
    Description: Security group attached to the instance.
    Value: !Ref N8nSecurityGroup
