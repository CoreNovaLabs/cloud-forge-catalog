AWSTemplateFormatVersion: '2010-09-09'
Description: 'Mosquitto on Cloud Forge - browser-based deployment'

Parameters:
  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues: [t3.medium, t3.small]

  LatestAmiId:
    Type: AWS::EC2::Image::Id
    Default: ami-0f6b6dc8c575106cb
  CaddyTlsMode:
    Type: String
    Default: ip-letsencrypt
    AllowedValues: [auto, ip-letsencrypt, http, internal]
    Description: Caddy TLS mode for the public endpoint.
  KeyName:
    Type: String
    Default: ''
    Description: Optional EC2 key pair name for SSH access.
  DomainName:
    Type: String
    Default: ''
  HostedZoneId:
    Type: String
    Default: ''
  CaddyEmail:
    Type: String
    Default: ''
    Description: Optional ACME contact email for Caddy public certificates.
  DiskSize:
    Type: Number
    Default: 20
    MinValue: 20
    MaxValue: 500
  VpcId:
    Type: String
    Default: ''
  SubnetId:
    Type: String
    Default: ''
  AllowedIP:
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: '^(([0-9]{1,3}\.){3}[0-9]{1,3}/([0-9]|[1-2][0-9]|3[0-2]))$'


Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, '']]
  HasDomain: !Not [!Equals [!Ref DomainName, '']]
  HasHostedZone: !Not [!Equals [!Ref HostedZoneId, '']]
  HasDNS: !And [!Condition HasDomain, !Condition HasHostedZone]
  HasVpc: !Not [!Equals [!Ref VpcId, '']]
  HasSubnet: !Not [!Equals [!Ref SubnetId, '']]


Resources:
  MosquittoSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow app traffic and restricted SSH for mosquitto
      VpcId: !If [HasVpc, !Ref VpcId, !Ref AWS::NoValue]
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 1883
          ToPort: 1883
          CidrIp: !Ref AllowedIP

        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedIP
      Tags:
        - Key: cloud-forge:app
          Value: mosquitto

  MosquittoInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref AWS::NoValue]
      SubnetId: !If [HasSubnet, !Ref SubnetId, !Ref AWS::NoValue]
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: !Ref DiskSize
            VolumeType: gp3
      SecurityGroupIds:
        - !Ref MosquittoSecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          export CLOUD_FORGE_CADDY_PUBLIC_IP=${MosquittoEIP}
          export CLOUD_FORGE_CADDY_TLS_MODE=${CaddyTlsMode}
          export CLOUD_FORGE_DOMAIN_NAME=${DomainName}
          export CLOUD_FORGE_CADDY_EMAIL=${CaddyEmail}



          curl -fsSL https://cdn.jsdelivr.net/gh/CoreNovaLabs/cloud-forge-catalog@v0.5.1/scripts/aws/bootstrap-app.sh -o /tmp/cf-bootstrap.sh
          bash /tmp/cf-bootstrap.sh mosquitto
      Tags:
        - Key: Name
          Value: cloud-forge-mosquitto
        - Key: cloud-forge:app
          Value: mosquitto

  MosquittoEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: cloud-forge:app
          Value: mosquitto

  MosquittoEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt MosquittoEIP.AllocationId
      InstanceId: !Ref MosquittoInstance

  MosquittoDNS:
    Type: AWS::Route53::RecordSet
    Condition: HasDNS
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      TTL: 300
      ResourceRecords:
        - !Ref MosquittoEIP

Outputs:
  ServiceURL:
    Description: Primary endpoint for mosquitto.
    Value: !If
      - HasDomain
      - !Sub 'mqtt://${DomainName}:1883'
      - !Sub 'mqtt://${MosquittoEIP}:1883'
  DomainName:
    Description: Custom domain when configured.
    Value: !Ref DomainName
  PublicIP:
    Description: Elastic IP address assigned to the service.
    Value: !Ref MosquittoEIP
  InstanceId:
    Description: Created EC2 instance ID.
    Value: !Ref MosquittoInstance
  AWSRegion:
    Description: AWS region where the stack is deployed.
    Value: !Ref AWS::Region
  AmiId:
    Description: AMI ID used by the EC2 instance.
    Value: !Ref LatestAmiId
  InstanceType:
    Description: EC2 instance type.
    Value: !Ref InstanceType
  SecurityGroupId:
    Description: Security group attached to the instance.
    Value: !Ref MosquittoSecurityGroup
