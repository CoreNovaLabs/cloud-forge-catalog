services:
  postgresql:
    image: postgres:17.2
    restart: unless-stopped


    env_file:
      - /opt/cloud-forge/compose.app.env
    ports:
      - 5432:5432
    volumes:
      - /opt/cloud-forge/data/postgresql:/var/lib/postgresql/data

    networks:
      - cloud-forge

networks:
  cloud-forge:
    name: cloud-forge
