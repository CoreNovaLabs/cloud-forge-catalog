services:
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      - MINIO_ROOT_USER=cloudforge
      - MINIO_ROOT_PASSWORD=cloudforge-change-me
    volumes:
      - /opt/cloud-forge/data/minio:/data

    networks:
      - cloud-forge

networks:
  cloud-forge:
    external: true
