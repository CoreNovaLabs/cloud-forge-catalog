AWSTemplateFormatVersion: '2010-09-09'
Description: 'Hello NGINX on Cloud Forge CLI - AWS local validation template'

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
  LatestAmiId:
    Type: AWS::EC2::Image::Id
    Default: ami-04cf9ac8716f030d6
  CaddyTlsMode:
    Type: String
    Default: ip-letsencrypt
    AllowedValues:
      - ip-letsencrypt
      - http
      - internal
    Description: Caddy TLS mode. Use ip-letsencrypt for automatic Let's Encrypt IP certificates without a domain.
  KeyName:
    Type: String
    Default: ''
    Description: Optional EC2 key pair name for SSH access.
  VpcId:
    Type: String
    Default: ''
    Description: Optional VPC ID. Leave empty to use the account default VPC.
  SubnetId:
    Type: String
    Default: ''
    Description: Optional subnet ID. Leave empty to use the account default subnet.
  AllowedIP:
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: '^(([0-9]{1,3}\.){3}[0-9]{1,3}/([0-9]|[1-2][0-9]|3[0-2]))$'

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, '']]
  HasVpc: !Not [!Equals [!Ref VpcId, '']]
  HasSubnet: !Not [!Equals [!Ref SubnetId, '']]
  UseHttp: !Equals [!Ref CaddyTlsMode, http]

Resources:
  HelloSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP, HTTPS, and restricted SSH for Hello NGINX
      VpcId: !If [HasVpc, !Ref VpcId, !Ref AWS::NoValue]
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedIP
      Tags:
        - Key: cloud-forge:app
          Value: hello-nginx

  HelloInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref AWS::NoValue]
      SubnetId: !If [HasSubnet, !Ref SubnetId, !Ref AWS::NoValue]
      SecurityGroupIds:
        - !Ref HelloSecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          install -d -m 0755 /opt/cloud-forge/data/hello-nginx/html
          cat >/opt/cloud-forge/data/hello-nginx/html/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head><meta charset="utf-8"><title>Cloud Forge</title></head>
          <body><h1>Hello from Cloud Forge</h1><p>NGINX is running on AWS.</p></body>
          </html>
          HTML
          cat >/opt/cloud-forge/docker-compose.app.yml <<'COMPOSE'
          services:
            nginx:
              image: nginx:1.27-alpine
              restart: unless-stopped
              volumes:
                - /opt/cloud-forge/data/hello-nginx/html:/usr/share/nginx/html:ro
              networks:
                - cloud-forge
          COMPOSE
          install -d -m 0755 /etc/cloud-forge
          cat >/etc/cloud-forge/app.env <<EOF
          CLOUD_FORGE_CADDY_PUBLIC_IP=${HelloEIP}
          CLOUD_FORGE_CADDY_UPSTREAM=http://nginx:80
          CLOUD_FORGE_CADDY_TLS_MODE=${CaddyTlsMode}
          CLOUD_FORGE_CADDY_AUTO_IP_CERT=true
          EOF
          /opt/cloud-forge/bin/cloud-forge-apply-app
      Tags:
        - Key: Name
          Value: cloud-forge-hello-nginx
        - Key: cloud-forge:app
          Value: hello-nginx

  HelloEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: cloud-forge:app
          Value: hello-nginx

  HelloEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt HelloEIP.AllocationId
      InstanceId: !Ref HelloInstance

Outputs:
  ServiceURL:
    Description: Primary endpoint for the sample service.
    Value: !If
      - UseHttp
      - !Sub 'http://${HelloEIP}'
      - !Sub 'https://${HelloEIP}'
  PublicIP:
    Description: Elastic IP address assigned to the service.
    Value: !Ref HelloEIP
  InstanceId:
    Description: Created EC2 instance ID.
    Value: !Ref HelloInstance
  AWSRegion:
    Description: AWS region where the stack is deployed.
    Value: !Ref AWS::Region
  AmiId:
    Description: AMI ID used by the EC2 instance.
    Value: !Ref LatestAmiId
  InstanceType:
    Description: EC2 instance type.
    Value: !Ref InstanceType
  SecurityGroupId:
    Description: Security group attached to the instance.
    Value: !Ref HelloSecurityGroup
