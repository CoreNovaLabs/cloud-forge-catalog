AWSTemplateFormatVersion: '2010-09-09'
Description: 'Gitea on Cloud Forge CLI - one-command deployment'

Parameters:
  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues: [t3.micro, t3.small, t3.medium, t3.large]
  LatestAmiId:
    Type: AWS::EC2::Image::Id
    Default: ami-0b9b527b5a400c0e4
  CaddyTlsMode:
    Type: String
    Default: ip-letsencrypt
    AllowedValues: [ip-letsencrypt, http, internal]
    Description: Caddy TLS mode for the public endpoint.
  KeyName:
    Type: String
    Default: ''
    Description: Optional EC2 key pair name for SSH access.
  DomainName:
    Type: String
    Default: ''
  HostedZoneId:
    Type: String
    Default: ''
  DiskSize:
    Type: Number
    Default: 20
    MinValue: 10
    MaxValue: 500
  VpcId:
    Type: String
    Default: ''
  SubnetId:
    Type: String
    Default: ''
  AllowedIP:
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: '^(([0-9]{1,3}\.){3}[0-9]{1,3}/([0-9]|[1-2][0-9]|3[0-2]))$'

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, '']]
  HasDomain: !Not [!Equals [!Ref DomainName, '']]
  HasHostedZone: !Not [!Equals [!Ref HostedZoneId, '']]
  HasDNS: !And [!Condition HasDomain, !Condition HasHostedZone]
  HasVpc: !Not [!Equals [!Ref VpcId, '']]
  HasSubnet: !Not [!Equals [!Ref SubnetId, '']]
  UseHttp: !Equals [!Ref CaddyTlsMode, http]

Resources:
  GiteaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP, HTTPS, and restricted SSH for Gitea
      VpcId: !If [HasVpc, !Ref VpcId, !Ref AWS::NoValue]
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedIP
      Tags:
        - Key: cloud-forge:app
          Value: gitea

  GiteaInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref AWS::NoValue]
      SubnetId: !If [HasSubnet, !Ref SubnetId, !Ref AWS::NoValue]
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: !Ref DiskSize
            VolumeType: gp3
      SecurityGroupIds:
        - !Ref GiteaSecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          install -d -m 0755 /opt/cloud-forge/data/gitea
          cat >/opt/cloud-forge/docker-compose.app.yml <<'COMPOSE'
          services:
            gitea:
              image: gitea/gitea:1.22
              restart: unless-stopped
              volumes:
                - /opt/cloud-forge/data/gitea:/data
              networks:
                - cloud-forge
          networks:
            cloud-forge:
              external: true
          COMPOSE
          install -d -m 0755 /etc/cloud-forge
          cat >/etc/cloud-forge/app.env <<EOF
          CLOUD_FORGE_CADDY_PUBLIC_IP=${GiteaEIP}
          CLOUD_FORGE_CADDY_UPSTREAM=http://gitea:3000
          CLOUD_FORGE_CADDY_TLS_MODE=${CaddyTlsMode}
          CLOUD_FORGE_CADDY_AUTO_IP_CERT=true
          EOF
          /opt/cloud-forge/bin/cloud-forge-apply-app
      Tags:
        - Key: Name
          Value: cloud-forge-gitea
        - Key: cloud-forge:app
          Value: gitea

  GiteaEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: cloud-forge:app
          Value: gitea

  GiteaEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt GiteaEIP.AllocationId
      InstanceId: !Ref GiteaInstance

  GiteaDNS:
    Type: AWS::Route53::RecordSet
    Condition: HasDNS
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      TTL: 300
      ResourceRecords:
        - !Ref GiteaEIP

Outputs:
  ServiceURL:
    Description: Primary endpoint for Gitea.
    Value: !If
      - UseHttp
      - !Sub 'http://${GiteaEIP}'
      - !Sub 'https://${GiteaEIP}'
  PublicIP:
    Description: Elastic IP address assigned to the service.
    Value: !Ref GiteaEIP
  InstanceId:
    Description: Created EC2 instance ID.
    Value: !Ref GiteaInstance
  AWSRegion:
    Description: AWS region where the stack is deployed.
    Value: !Ref AWS::Region
  AmiId:
    Description: AMI ID used by the EC2 instance.
    Value: !Ref LatestAmiId
  InstanceType:
    Description: EC2 instance type.
    Value: !Ref InstanceType
  SecurityGroupId:
    Description: Security group attached to the instance.
    Value: !Ref GiteaSecurityGroup
